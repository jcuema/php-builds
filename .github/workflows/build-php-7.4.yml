name: Build Talos PHP 7.4 (LEGACY)

on:
  workflow_dispatch:
    inputs:
      build_mac_arm:
        description: 'macOS ARM64 (Apple Silicon) - ALTO RISCO DE FALHA'
        type: boolean
        default: true
      build_linux_amd:
        description: 'Linux AMD64'
        type: boolean
        default: true
      build_linux_arm:
        description: 'Linux ARM64'
        type: boolean
        default: true

env:
  PHP_TARGET_VERSION: "7.4"

permissions:
  contents: write

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          MATRIX="[]"
          if [ "${{ inputs.build_mac_arm }}" == "true" ]; then
            MATRIX=$(echo $MATRIX | jq -c '. += [{"os_runner": "macos-14", "os_name": "darwin", "arch": "arm64", "target": ""}]')
          fi
          if [ "${{ inputs.build_linux_amd }}" == "true" ]; then
            MATRIX=$(echo $MATRIX | jq -c '. += [{"os_runner": "ubuntu-24.04", "os_name": "linux", "arch": "amd64", "target": "x86_64-linux-gnu"}]')
          fi
          if [ "${{ inputs.build_linux_arm }}" == "true" ]; then
            MATRIX=$(echo $MATRIX | jq -c '. += [{"os_runner": "ubuntu-24.04-arm", "os_name": "linux", "arch": "arm64", "target": "aarch64-linux-gnu"}]')
          fi
          echo "matrix={\"include\":$MATRIX}" >> $GITHUB_OUTPUT

  build:
    needs: setup-matrix
    if: ${{ fromJson(needs.setup-matrix.outputs.matrix).include[0] != null }}
    runs-on: ${{ matrix.os_runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Instalar Dependências Base (Linux)
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          # Removido dependências estritas para evitar conflito com toolchains muito novos
          sudo apt-get install -y wget curl jq musl-tools build-essential autoconf libtool bison re2c pkg-config

      - name: Baixar e Configurar SPC
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SPC_OS=$([ "${{ matrix.os_name }}" == "darwin" ] && echo "macos" || echo "linux")
          SPC_ARCH=$([ "${{ matrix.arch }}" == "amd64" ] && echo "x86_64" || echo "aarch64")
          SPC_FILE="spc-${SPC_OS}-${SPC_ARCH}.tar.gz"
          
          gh release download --repo crazywhalecc/static-php-cli --pattern "$SPC_FILE"
          tar -xzf "$SPC_FILE" && chmod +x spc
          
          if [ -n "${{ matrix.target }}" ]; then
            export SPC_TARGET="${{ matrix.target }}"
          fi
          ./spc doctor --auto-fix

      - name: Download de Fontes (Expurgando mongodb e ffi)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./spc download --with-php="${{ env.PHP_TARGET_VERSION }}" \
          --for-extensions="bcmath,bz2,calendar,ctype,curl,dba,dom,exif,fileinfo,filter,ftp,gd,gmp,iconv,igbinary,intl,ldap,lz4,mbstring,mbregex,mysqli,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_pgsql,pdo_sqlite,pgsql,phar,posix,readline,redis,session,shmop,simplexml,soap,sockets,sodium,sqlite3,sysvmsg,sysvsem,sysvshm,tokenizer,xml,xmlreader,xmlwriter,xsl,zip,zlib,xdebug" \
          --for-libs="libjpeg,libwebp,freetype"

      - name: Extração Nativa e Contorno de Compilador Moderno
        run: |
          echo "1. Extraindo código-fonte do PHP via ferramenta oficial..."
          ./spc extract php-src
          
          echo "2. Desativando IFUNC no Autoconf..."
          sed -i '2i export ac_cv_func_ifunc=no' source/php-src/configure

      - name: Compilar PHP Estático 7.4 (Com bypass de tipagem)
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            export SPC_TARGET="${{ matrix.target }}"
          fi
          
          # [HACK] Força o compilador LLVM 16+ a ignorar o código C sujo e obsoleto de 2019
          # Rebaixa os erros fatais de ponteiros e declarações implícitas para meros "Avisos"
          export EXTRA_CFLAGS="-Wno-incompatible-pointer-types -Wno-implicit-function-declaration -Wno-int-conversion"
          
          ./spc build "bcmath,bz2,calendar,ctype,curl,dba,dom,exif,fileinfo,filter,ftp,gd,gmp,iconv,igbinary,intl,ldap,lz4,mbstring,mbregex,mysqli,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_pgsql,pdo_sqlite,pgsql,phar,posix,readline,redis,session,shmop,simplexml,soap,sockets,sodium,sqlite3,sysvmsg,sysvsem,sysvshm,tokenizer,xml,xmlreader,xmlwriter,xsl,zip,zlib" \
            --build-cli \
            --build-fpm \
            --build-shared="xdebug" \
            --with-libs="libjpeg,libwebp,freetype"

      - name: 🚨 Capturar Erro Real do Compilador
        if: failure()
        run: |
          echo "### 🚨 Falha Estrutural: PHP ${{ env.PHP_TARGET_VERSION }} (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          tail -n 150 /home/runner/work/php-builds/php-builds/log/spc.shell.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Estruturar e Empacotar
        id: package
        run: |
          EXACT_VERSION=$(./buildroot/bin/php -r "echo PHP_VERSION;")
          
          echo "### 🚀 Build PHP ${{ env.PHP_TARGET_VERSION }} Concluído: ${{ matrix.os_name }} (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Versão Exata:** \`$EXACT_VERSION\`" >> $GITHUB_STEP_SUMMARY
          
          mkdir -p release_talos/bin release_talos/ext
          cp buildroot/bin/php release_talos/bin/
          cp buildroot/bin/php-fpm release_talos/bin/
          find buildroot/ -name "xdebug.so" -exec cp {} release_talos/ext/ \;
          
          TAR_FILENAME="php-${{ env.PHP_TARGET_VERSION }}-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz"
          cd release_talos
          tar -czf "../$TAR_FILENAME" bin ext
          cd ..
          
          echo "tar_filename=$TAR_FILENAME" >> $GITHUB_OUTPUT

      - name: Publicar na Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest --title "Talos Latest Binaries" || true
          gh release upload latest ./${{ steps.package.outputs.tar_filename }} --clobber
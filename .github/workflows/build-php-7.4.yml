name: Build Talos PHP 7.4 (LEGACY)

on:
  workflow_dispatch:
    inputs:
      build_mac_intel:
        description: 'macOS Intel (Roda via Rosetta no Mac M-Series)'
        type: boolean
        default: true
      build_linux_amd:
        description: 'Linux AMD64 (Ubuntu 20.04 Legacy)'
        type: boolean
        default: true

env:
  PHP_TARGET_VERSION: "7.4"

permissions:
  contents: write

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          MATRIX="[]"
          # Utilizamos macos-13 obrigatoriamente para forçar a arquitetura Intel (x86_64).
          # O código do PHP 7.4 não reconhece a existência de processadores Apple Silicon.
          if [ "${{ inputs.build_mac_intel }}" == "true" ]; then
            MATRIX=$(echo $MATRIX | jq -c '. += [{"os_runner": "macos-13", "os_name": "darwin", "arch": "x86_64", "target": ""}]')
          fi
          # Utilizamos ubuntu-20.04 para prover o ecossistema original (OpenSSL 1.1.1, Clang antigo)
          if [ "${{ inputs.build_linux_amd }}" == "true" ]; then
            MATRIX=$(echo $MATRIX | jq -c '. += [{"os_runner": "ubuntu-20.04", "os_name": "linux", "arch": "x86_64", "target": "x86_64-linux-gnu"}]')
          fi
          echo "matrix={\"include\":$MATRIX}" >> $GITHUB_OUTPUT

  build:
    needs: setup-matrix
    if: ${{ fromJson(needs.setup-matrix.outputs.matrix).include[0] != null }}
    runs-on: ${{ matrix.os_runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Instalar Dependências Base (Linux)
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl jq musl-tools build-essential autoconf libtool bison re2c pkg-config

      - name: Baixar e Configurar SPC (Versão travada para estabilidade legada)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SPC_OS=$([ "${{ matrix.os_name }}" == "darwin" ] && echo "macos" || echo "linux")
          SPC_ARCH="x86_64" # Forçado para Intel/AMD
          SPC_FILE="spc-${SPC_OS}-${SPC_ARCH}.tar.gz"
          
          gh release download --repo crazywhalecc/static-php-cli --pattern "$SPC_FILE"
          tar -xzf "$SPC_FILE" && chmod +x spc
          
          if [ -n "${{ matrix.target }}" ]; then
            export SPC_TARGET="${{ matrix.target }}"
          fi
          ./spc doctor --auto-fix

      - name: Download de Fontes (Expurgando extensões modernas)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extensões C++ complexas (intl) e modernas (mongodb) foram expurgadas para garantir estabilidade do código C raiz
          ./spc download --with-php="${{ env.PHP_TARGET_VERSION }}" \
          --for-extensions="bcmath,bz2,calendar,ctype,curl,dba,dom,exif,fileinfo,filter,ftp,gd,gmp,iconv,igbinary,ldap,lz4,mbstring,mbregex,mysqli,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_pgsql,pdo_sqlite,pgsql,phar,posix,readline,redis,session,shmop,simplexml,soap,sockets,sodium,sqlite3,sysvmsg,sysvsem,sysvshm,tokenizer,xml,xmlreader,xmlwriter,xsl,zip,zlib" \
          --for-libs="libjpeg,libwebp,freetype"

      - name: Compilar PHP Estático 7.4
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            export SPC_TARGET="${{ matrix.target }}"
          fi
          
          # Desliga as otimizações vetoriais antigas que podem conflitar com o Clang
          export CFLAGS="-mno-avx -mno-avx2"
          
          ./spc build "bcmath,bz2,calendar,ctype,curl,dba,dom,exif,fileinfo,filter,ftp,gd,gmp,iconv,igbinary,ldap,lz4,mbstring,mbregex,mysqli,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_pgsql,pdo_sqlite,pgsql,phar,posix,readline,redis,session,shmop,simplexml,soap,sockets,sodium,sqlite3,sysvmsg,sysvsem,sysvshm,tokenizer,xml,xmlreader,xmlwriter,xsl,zip,zlib" \
            --build-cli \
            --build-fpm \
            --with-libs="libjpeg,libwebp,freetype"

      - name: 🚨 Capturar Erro Real do Compilador
        if: failure()
        run: |
          echo "### 🚨 Falha Estrutural: PHP ${{ env.PHP_TARGET_VERSION }} (${{ matrix.os_name }}-${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          tail -n 150 /home/runner/work/php-builds/php-builds/log/spc.shell.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Estruturar e Empacotar
        id: package
        run: |
          EXACT_VERSION=$(./buildroot/bin/php -r "echo PHP_VERSION;")
          
          echo "### 🚀 Build PHP ${{ env.PHP_TARGET_VERSION }} Concluído: ${{ matrix.os_name }} (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Versão Exata:** \`$EXACT_VERSION\`" >> $GITHUB_STEP_SUMMARY
          
          mkdir -p release_talos/bin
          cp buildroot/bin/php release_talos/bin/
          cp buildroot/bin/php-fpm release_talos/bin/
          
          TAR_FILENAME="php-${{ env.PHP_TARGET_VERSION }}-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz"
          cd release_talos
          tar -czf "../$TAR_FILENAME" bin
          cd ..
          
          echo "tar_filename=$TAR_FILENAME" >> $GITHUB_OUTPUT

      - name: Publicar na Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest --title "Talos Latest Binaries" || true
          gh release upload latest ./${{ steps.package.outputs.tar_filename }} --clobber